name: TikTok watchlist shards

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,6,12,18 * * *'

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        instance: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    concurrency:
      group: tiktok-watchlist-shard-${{ matrix.instance }}
      cancel-in-progress: false
    env:
      SHARD_COUNT: 9
      WATCHLIST_FILE: username.txt
      COOKIES_FILE: cookies.txt
      AUTOMATIC_INTERVAL: 15
      MAX_WORKERS: 3
      JITTER_SECONDS: 60
      BACKOFF_MINUTES: 20
      TIKTOK_COOKIES_JSON: ${{ secrets.TIKTOK_COOKIES_JSON }}
      TIKTOK_COOKIES_TXT_B64: ${{ secrets.TIKTOK_COOKIES_TXT_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python -m pip install -r src/requirements.txt

      - name: Prepare TikTok cookies
        run: |
          if [ -n "$TIKTOK_COOKIES_JSON" ]; then
            printf '%s' "$TIKTOK_COOKIES_JSON" > src/cookies.json
          elif [ -n "$TIKTOK_COOKIES_TXT_B64" ]; then
            printf '%s' "$TIKTOK_COOKIES_TXT_B64" | base64 --decode > /tmp/tiktok_cookies.txt
            python src/cookies_txt_to_json.py /tmp/tiktok_cookies.txt src/cookies.json
            rm -f /tmp/tiktok_cookies.txt
          elif [ -f "$COOKIES_FILE" ]; then
            python src/cookies_txt_to_json.py "$COOKIES_FILE" src/cookies.json
          fi
          if [ ! -f src/cookies.json ]; then
            printf '{}\n' > src/cookies.json
          fi

      - name: Validate watchlist file
        run: |
          test -f "$WATCHLIST_FILE"
          test -s "$WATCHLIST_FILE"

      - name: Run recorder shard
        timeout-minutes: 340
        run: |
          mkdir -p "outputs/instance-${{ matrix.instance }}"
          set +e
          timeout --signal=INT --kill-after=60s 335m python src/main.py \
            -mode watchlist \
            -watchlist_file "$WATCHLIST_FILE" \
            -shard_index "${{ matrix.instance }}" \
            -shard_count "$SHARD_COUNT" \
            -max_workers "$MAX_WORKERS" \
            -automatic_interval "$AUTOMATIC_INTERVAL" \
            -jitter_seconds "$JITTER_SECONDS" \
            -backoff_minutes "$BACKOFF_MINUTES" \
            -output "outputs/instance-${{ matrix.instance }}" \
            -no-update-check
          status=$?
          if [ "$status" -eq 124 ] || [ "$status" -eq 130 ]; then
            echo "Recorder window ended; continuing to artifact upload."
            exit 0
          fi
          exit "$status"

      - name: Archive instance outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instance-${{ matrix.instance }}-artifacts
          path: outputs/instance-${{ matrix.instance }}
          if-no-files-found: warn
          retention-days: 7
